server {
    listen 80;
    listen [::]:80;
    server_name pesupeluh.local www.pesupeluh.local 127.0.0.1 localhost 172.13.0.10;

    root /var/www/html;
    index index.php index.html index.htm;

    charset utf-8;
    client_max_body_size 100m;

    location /pesupeluh {
        alias /var/www/pesupeluh/public;
        try_files $uri $uri/ @pesupeluh-index;
    }

    location @pesupeluh-index {
        rewrite ^/pesupeluh/(.*)$ /pesupeluh/index.php last;
    }

         # Handle PHP for /pesupeluh (Fixed Path Mapping)
       location ~ ^/pesupeluh/(.+\.php)$ {
           alias /var/www/pesupeluh/public/$1;
           fastcgi_pass 127.0.0.1:9000;
           fastcgi_index index.php;
           include fastcgi_params;
           
           # Hardcode the absolute script path so PHP-FPM never sees a broken string
           fastcgi_param SCRIPT_FILENAME /var/www/pesupeluh/public/$1;
           fastcgi_param SCRIPT_NAME /pesupeluh/$1;
           fastcgi_param HTTP_PROXY "";
       }

}

# Nginx site configuration for Pesu Peluh
# Adjust fastcgi_pass to your PHP-FPM socket or TCP port if needed.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name pesupeluh.local www.pesupeluh.local 127.0.0.1 localhost;

    root /var/www/html;
    index index.php index.html index.htm;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    charset utf-8;
    client_max_body_size 100m;

    # Pesu Peluh app at /pesupeluh
    location /pesupeluh {
        alias /var/www/pesupeluh/public;
        
        # For files and directories that exist, serve them
        try_files $uri $uri/ @pesupeluh-index;
    }

    # Fallback to index.php for routing
    location @pesupeluh-index {
        rewrite ^/pesupeluh/(.*)$ /pesupeluh/index.php last;
    }

    # Handle PHP for /pesupeluh
    location ~ ^/pesupeluh/.*\.php$ {
        fastcgi_split_path_info ^/pesupeluh/(.+\.php)(.*)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/pesupeluh/public/$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME /pesupeluh/$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
    }

    # Default PHP handler for other apps
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
    }

    location ~ /\.ht {
        deny all;
    }
}
